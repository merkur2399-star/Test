name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Java 17 Kurulumu
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Gradlew yetkilendirme
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 3. Gradle S³r³m³n³ 8.7'ye y³kselt
      - name: Force Gradle Update
        run: ./gradlew wrapper --gradle-version 8.7

      # 4. Build komutu (API 35 parametreleri ile)
      - name: Build with Gradle
        run: ./gradlew assembleDebug -Pandroid.compileSdkVersion=35 -Pandroid.targetSdkVersion=35

      # 5. APK'y² þ²kt² olarak al
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk