name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission
        run: chmod +x ./gradlew

      # Gradle 5.6.4, Java 17 ile çalýţýrken 'vmplugin.v7.Java7' hatasý verir.
      # Bunu aţmak için Gradle'a "ben aslýnda Java 8 kullanýyorum" yalanýný söylüyoruz.
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          GRADLE_OPTS: "-Dorg.gradle.java.home=${{ env.JAVA_HOME_17_X64 }} -Dorg.gradle.jvmargs='-Djava.version=8'"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk