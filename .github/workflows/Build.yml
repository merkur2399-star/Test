name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Senin dosyalarýný GitHub sunucusuna çek
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. GitHub kendi içinde JDK 17'yi indirip kurar
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. GitHub kendi içinde Gradle 8.7'yi indirip kurar
      - name: Install Gradle 8.7
        run: |
          ./gradlew wrapper --gradle-version 8.7
          chmod +x gradlew

      # 4. GitHub kendi içinde build iţlemini gerçekleţtirir
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Sonuç dosyasýný (APK) sana sunar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk